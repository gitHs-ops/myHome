<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桜の茶園 — 벚꽃 다원</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Shippori+Mincho:wght@300;400&display=swap');

  :root {
    --sakura: #f4a7b9;
    --sakura-deep: #d4607a;
    --matcha: #5c7a4e;
    --matcha-light: #8aad6e;
    --sky: #c8dff5;
    --sky-deep: #7aa8d4;
    --wood: #8b6543;
    --fog: rgba(240,230,220,0.18);
    --gold: #d4a843;
    --ink: #1a1208;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    overflow: hidden;
    font-family: 'Shippori Mincho', serif;
    cursor: none;
  }

  #canvas { display: block; width: 100vw; height: 100vh; }

  #ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #compass {
    position: fixed;
    top: 24px; right: 28px;
    width: 64px; height: 64px;
    border: 1.5px solid rgba(244,167,185,0.5);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10,8,6,0.55);
    backdrop-filter: blur(6px);
  }
  #compass-needle {
    width: 2px; height: 28px;
    background: linear-gradient(to bottom, var(--sakura-deep) 50%, rgba(255,255,255,0.3) 50%);
    border-radius: 2px;
    transform-origin: 50% 50%;
    transition: transform 0.3s ease;
  }

  #season-panel {
    position: fixed;
    top: 24px; left: 28px;
    display: flex; flex-direction: column; gap: 4px;
  }
  #season-label {
    font-size: 11px;
    color: rgba(244,167,185,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  #season-name {
    font-size: 22px;
    color: var(--sakura);
    font-weight: 300;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(244,167,185,0.4);
  }
  #petal-count {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  #controls-hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 20px;
    align-items: center;
    opacity: 0.5;
    transition: opacity 0.5s;
  }
  #controls-hint:hover { opacity: 0.85; }
  .hint-key {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1.5px;
  }

  #loading {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0a0608;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 1.5s ease;
  }
  #loading-kanji {
    font-size: 80px;
    color: var(--sakura);
    opacity: 0;
    animation: fadeIn 1.2s forwards 0.3s;
    text-shadow: 0 0 60px rgba(244,167,185,0.3);
  }
  #loading-sub {
    font-size: 13px;
    color: rgba(244,167,185,0.5);
    letter-spacing: 6px;
    margin-top: 16px;
    opacity: 0;
    animation: fadeIn 1s forwards 0.8s;
  }
  #loading-bar-wrap {
    width: 180px;
    height: 1px;
    background: rgba(255,255,255,0.1);
    margin-top: 40px;
    opacity: 0;
    animation: fadeIn 0.8s forwards 1s;
    overflow: hidden;
  }
  #loading-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, transparent, var(--sakura), transparent);
    animation: loadBar 1.8s ease forwards 1.2s;
  }
  @keyframes loadBar { to { width: 100%; } }
  @keyframes fadeIn { to { opacity: 1; } }

  #cursor {
    position: fixed;
    width: 18px; height: 18px;
    border: 1.5px solid rgba(244,167,185,0.7);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    transition: transform 0.08s, width 0.15s, height 0.15s, border-color 0.2s;
    mix-blend-mode: screen;
  }
  #cursor.active {
    width: 8px; height: 8px;
    border-color: rgba(244,167,185,1);
  }

  #time-bar {
    position: fixed;
    bottom: 28px;
    right: 28px;
    display: flex; flex-direction: column; align-items: flex-end; gap: 5px;
  }
  #time-label {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
  }
  #sun-track {
    width: 100px;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    position: relative;
    overflow: visible;
  }
  #sun-dot {
    position: absolute;
    top: 50%;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px var(--gold);
    transition: left 1s linear;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <div id="season-panel">
    <div id="season-label">현재 계절</div>
    <div id="season-name">봄 · 春</div>
    <div id="petal-count">꽃잎 0개 수집</div>
  </div>

  <div id="compass">
    <div id="compass-needle"></div>
  </div>

  <div id="time-bar">
    <div id="time-label">시각</div>
    <div id="sun-track">
      <div id="sun-dot" style="left:30%"></div>
    </div>
  </div>

  <div id="controls-hint">
    <span class="hint-key">W A S D · 이동</span>
    <span class="hint-key">마우스 · 시선</span>
    <span class="hint-key">SHIFT · 달리기</span>
    <span class="hint-key">SPACE · 점프</span>
  </div>
</div>

<div id="loading">
  <div id="loading-kanji">桜</div>
  <div id="loading-sub">벚꽃 다원을 준비하는 중</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<div id="cursor"></div>

<script>
// ──────────────────────────────────────────────
// SAKURA GARDEN — 3D Infinite Cherry Blossom Tea Garden
// ──────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
if (!gl) { alert('WebGL을 지원하지 않는 브라우저입니다.'); }

// ── Resize ──────────────────────────────────────
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// ── Math helpers ────────────────────────────────
const mat4 = {
  create() { return new Float32Array(16); },
  identity(m) {
    m.fill(0); m[0]=m[5]=m[10]=m[15]=1; return m;
  },
  perspective(m, fov, aspect, near, far) {
    const f = 1/Math.tan(fov/2), nf = 1/(near-far);
    m[0]=f/aspect; m[1]=0; m[2]=0; m[3]=0;
    m[4]=0; m[5]=f; m[6]=0; m[7]=0;
    m[8]=0; m[9]=0; m[10]=(far+near)*nf; m[11]=-1;
    m[12]=0; m[13]=0; m[14]=2*far*near*nf; m[15]=0;
    return m;
  },
  multiply(out, a, b) {
    for(let i=0;i<4;i++) for(let j=0;j<4;j++) {
      out[j*4+i]=0;
      for(let k=0;k<4;k++) out[j*4+i]+=a[k*4+i]*b[j*4+k];
    }
    return out;
  },
  translate(out, a, v) {
    const [x,y,z]=v;
    if(a===out) {
      out[12]=a[0]*x+a[4]*y+a[8]*z+a[12];
      out[13]=a[1]*x+a[5]*y+a[9]*z+a[13];
      out[14]=a[2]*x+a[6]*y+a[10]*z+a[14];
      out[15]=a[3]*x+a[7]*y+a[11]*z+a[15];
    } else {
      out.set(a);
      out[12]=a[0]*x+a[4]*y+a[8]*z+a[12];
      out[13]=a[1]*x+a[5]*y+a[9]*z+a[13];
      out[14]=a[2]*x+a[6]*y+a[10]*z+a[14];
      out[15]=a[3]*x+a[7]*y+a[11]*z+a[15];
    }
    return out;
  },
  rotateY(out, a, rad) {
    const s=Math.sin(rad), c=Math.cos(rad);
    const a00=a[0],a01=a[1],a02=a[2],a03=a[3];
    const a20=a[8],a21=a[9],a22=a[10],a23=a[11];
    out.set(a);
    out[0]=a00*c-a20*s; out[1]=a01*c-a21*s;
    out[2]=a02*c-a22*s; out[3]=a03*c-a23*s;
    out[8]=a00*s+a20*c; out[9]=a01*s+a21*c;
    out[10]=a02*s+a22*c; out[11]=a03*s+a23*c;
    return out;
  },
  rotateX(out, a, rad) {
    const s=Math.sin(rad), c=Math.cos(rad);
    const a10=a[4],a11=a[5],a12=a[6],a13=a[7];
    const a20=a[8],a21=a[9],a22=a[10],a23=a[11];
    out.set(a);
    out[4]=a10*c+a20*s; out[5]=a11*c+a21*s;
    out[6]=a12*c+a22*s; out[7]=a13*c+a23*s;
    out[8]=a20*c-a10*s; out[9]=a21*c-a11*s;
    out[10]=a22*c-a12*s; out[11]=a23*c-a13*s;
    return out;
  },
  scale(out, a, v) {
    out.set(a);
    out[0]*=v[0]; out[1]*=v[0]; out[2]*=v[0]; out[3]*=v[0];
    out[4]*=v[1]; out[5]*=v[1]; out[6]*=v[1]; out[7]*=v[1];
    out[8]*=v[2]; out[9]*=v[2]; out[10]*=v[2]; out[11]*=v[2];
    return out;
  },
  lookAt(out, eye, center, up) {
    let fx=center[0]-eye[0], fy=center[1]-eye[1], fz=center[2]-eye[2];
    let fl=Math.sqrt(fx*fx+fy*fy+fz*fz); fx/=fl; fy/=fl; fz/=fl;
    let sx=fy*up[2]-fz*up[1], sy=fz*up[0]-fx*up[2], sz=fx*up[1]-fy*up[0];
    let sl=Math.sqrt(sx*sx+sy*sy+sz*sz); if(sl>0){sx/=sl;sy/=sl;sz/=sl;}
    let ux=sy*fz-sz*fy, uy=sz*fx-sx*fz, uz=sx*fy-sy*fx;
    out[0]=sx; out[1]=ux; out[2]=-fx; out[3]=0;
    out[4]=sy; out[5]=uy; out[6]=-fy; out[7]=0;
    out[8]=sz; out[9]=uz; out[10]=-fz; out[11]=0;
    out[12]=-(sx*eye[0]+sy*eye[1]+sz*eye[2]);
    out[13]=-(ux*eye[0]+uy*eye[1]+uz*eye[2]);
    out[14]= (fx*eye[0]+fy*eye[1]+fz*eye[2]);
    out[15]=1;
    return out;
  },
  invert(out, a) {
    const a00=a[0],a01=a[1],a02=a[2],a03=a[3];
    const a10=a[4],a11=a[5],a12=a[6],a13=a[7];
    const a20=a[8],a21=a[9],a22=a[10],a23=a[11];
    const a30=a[12],a31=a[13],a32=a[14],a33=a[15];
    const b00=a00*a11-a01*a10, b01=a00*a12-a02*a10;
    const b02=a00*a13-a03*a10, b03=a01*a12-a02*a11;
    const b04=a01*a13-a03*a11, b05=a02*a13-a03*a12;
    const b06=a20*a31-a21*a30, b07=a20*a32-a22*a30;
    const b08=a20*a33-a23*a30, b09=a21*a32-a22*a31;
    const b10=a21*a33-a23*a31, b11=a22*a33-a23*a32;
    let det=b00*b11-b01*b10+b02*b09+b03*b08-b04*b07+b05*b06;
    if(!det) return null;
    det=1/det;
    out[0]=(a11*b11-a12*b10+a13*b09)*det;
    out[1]=(a02*b10-a01*b11-a03*b09)*det;
    out[2]=(a31*b05-a32*b04+a33*b03)*det;
    out[3]=(a22*b04-a21*b05-a23*b03)*det;
    out[4]=(a12*b08-a10*b11-a13*b07)*det;
    out[5]=(a00*b11-a02*b08+a03*b07)*det;
    out[6]=(a32*b02-a30*b05-a33*b01)*det;
    out[7]=(a20*b05-a22*b02+a23*b01)*det;
    out[8]=(a10*b10-a11*b08+a13*b06)*det;
    out[9]=(a02*b06-a00*b10+a03*b08)*det; // fixed sign
    out[10]=(a30*b04-a31*b02+a33*b00)*det;
    out[11]=(a21*b02-a20*b04-a23*b00)*det;
    out[12]=(a11*b07-a10*b09-a12*b06)*det;
    out[13]=(a00*b09-a01*b07+a02*b06)*det;
    out[14]=(a31*b01-a30*b03-a32*b00)*det;
    out[15]=(a20*b03-a21*b01+a22*b00)*det;
    return out;
  },
  transpose(out, a) {
    if(out===a){
      let t;
      t=a[1]; out[1]=a[4]; out[4]=t;
      t=a[2]; out[2]=a[8]; out[8]=t;
      t=a[6]; out[6]=a[9]; out[9]=t;
      t=a[3]; out[3]=a[12]; out[12]=t;
      t=a[7]; out[7]=a[13]; out[13]=t;
      t=a[11]; out[11]=a[14]; out[14]=t;
    } else {
      out[0]=a[0]; out[1]=a[4]; out[2]=a[8]; out[3]=a[12];
      out[4]=a[1]; out[5]=a[5]; out[6]=a[9]; out[7]=a[13];
      out[8]=a[2]; out[9]=a[6]; out[10]=a[10]; out[11]=a[14];
      out[12]=a[3]; out[13]=a[7]; out[14]=a[11]; out[15]=a[15];
    }
    return out;
  }
};

// ── Shader compile ───────────────────────────────
function compileShader(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if(!gl.getShaderParameter(sh, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(sh));
  return sh;
}
function createProgram(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, compileShader(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p, gl.LINK_STATUS))
    console.error(gl.getProgramInfoLog(p));
  return p;
}

// ══════════════════════════════════════════════════
// SHADERS
// ══════════════════════════════════════════════════

// ── Ground shader ──
const groundVS = `
attribute vec3 aPos;
attribute vec2 aUV;
attribute vec3 aNormal;
uniform mat4 uProj, uView, uModel;
varying vec2 vUV;
varying vec3 vNormal;
varying vec3 vWorldPos;
void main() {
  vec4 wp = uModel * vec4(aPos,1.0);
  vWorldPos = wp.xyz;
  vUV = aUV;
  vNormal = normalize(mat3(uModel)*aNormal);
  gl_Position = uProj * uView * wp;
}`;

const groundFS = `
precision highp float;
varying vec2 vUV;
varying vec3 vNormal;
varying vec3 vWorldPos;
uniform vec3 uSunDir;
uniform vec3 uSunColor;
uniform vec3 uAmbient;
uniform float uTime;
uniform float uFogDist;

float hash(vec2 p) {
  return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);
}
float noise(vec2 p) {
  vec2 i=floor(p), f=fract(p);
  f=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}

void main() {
  // Grass / moss base
  float n1=noise(vUV*8.0);
  float n2=noise(vUV*24.0+vec2(uTime*0.01));
  float n3=noise(vUV*60.0);
  
  vec3 grassDark = vec3(0.18,0.30,0.12);
  vec3 grassLight = vec3(0.38,0.55,0.22);
  vec3 mossGreen = vec3(0.24,0.42,0.17);
  vec3 dirt = vec3(0.35,0.25,0.15);
  
  vec3 col = mix(grassDark, grassLight, n1);
  col = mix(col, mossGreen, n2*0.4);
  col = mix(col, dirt, smoothstep(0.7,0.9,n3)*0.3);
  
  // Tea rows pattern
  float row = fract(vWorldPos.z * 0.25);
  float teaRow = smoothstep(0.1,0.2,row)*smoothstep(0.9,0.8,row);
  vec3 teaGreen = vec3(0.22,0.48,0.18);
  col = mix(col, teaGreen, teaRow * 0.7);
  
  // Path (gravel)
  float pathX = abs(fract(vWorldPos.x * 0.1 + 0.5)-0.5)*2.0;
  float pathZ = abs(fract(vWorldPos.z * 0.1 + 0.5)-0.5)*2.0;
  float path = max(0.0, 1.0 - max(pathX,pathZ)*8.0);
  vec3 gravel = vec3(0.65,0.58,0.48) + noise(vWorldPos.xz*12.0)*0.1;
  col = mix(col, gravel, path * 0.8);

  // Lighting
  float diff = max(0.0, dot(vNormal, uSunDir));
  vec3 lit = col * (uAmbient + uSunColor * diff);
  
  // Fog
  float dist = length(vWorldPos.xz);
  float fog = smoothstep(uFogDist*0.4, uFogDist, dist);
  vec3 fogColor = vec3(0.78,0.72,0.68);
  lit = mix(lit, fogColor, fog);

  gl_FragColor = vec4(lit, 1.0);
}`;

// ── Tree shader ──
const treeVS = `
attribute vec3 aPos;
attribute vec3 aNormal;
attribute vec3 aColor;
attribute float aWave;
uniform mat4 uProj, uView, uModel;
uniform float uTime;
varying vec3 vColor;
varying vec3 vNormal;
varying vec3 vWorldPos;
void main() {
  vec3 p = aPos;
  // Gentle wind sway for foliage
  if(aWave > 0.5) {
    float wave = sin(uTime*1.2 + p.x*0.5 + p.z*0.3) * 0.05 * aWave;
    float wave2 = cos(uTime*0.9 + p.z*0.4) * 0.03 * aWave;
    p.x += wave;
    p.z += wave2;
  }
  vec4 wp = uModel * vec4(p,1.0);
  vWorldPos = wp.xyz;
  vColor = aColor;
  vNormal = normalize(mat3(uModel)*aNormal);
  gl_Position = uProj * uView * wp;
}`;

const treeFS = `
precision highp float;
varying vec3 vColor;
varying vec3 vNormal;
varying vec3 vWorldPos;
uniform vec3 uSunDir;
uniform vec3 uSunColor;
uniform vec3 uAmbient;
uniform float uFogDist;
uniform vec3 uCamPos;

void main() {
  float diff = max(0.0, dot(vNormal, uSunDir)) * 0.8 + 0.2;
  vec3 lit = vColor * (uAmbient + uSunColor * diff);
  
  float dist = length(vWorldPos - uCamPos);
  float fog = smoothstep(uFogDist*0.5, uFogDist, dist);
  vec3 fogColor = vec3(0.82,0.76,0.73);
  lit = mix(lit, fogColor, fog);
  
  gl_FragColor = vec4(lit, 1.0);
}`;

// ── Petal particle shader ──
const petalVS = `
attribute vec3 aPos;
attribute vec2 aUV;
attribute vec4 aPetalData; // x=size, y=phase, z=rotSpeed, w=type
uniform mat4 uProj, uView;
uniform float uTime;
uniform vec3 uCamPos;
varying vec2 vUV;
varying float vAlpha;
varying float vType;

void main() {
  float t = uTime * 0.3 + aPetalData.y;
  
  // Drift downward with swirl
  float x = aPos.x + sin(t*1.3 + aPetalData.y*2.0)*1.5;
  float y = mod(aPos.y - t*1.2, 12.0);
  float z = aPos.z + cos(t*1.1 + aPetalData.y*1.7)*1.2;
  
  vec3 pos = vec3(x, y, z);
  float dist = length(pos - uCamPos);
  
  vAlpha = smoothstep(30.0, 8.0, dist) * smoothstep(0.0, 1.0, y);
  vType = aPetalData.w;
  
  // Billboard
  vec4 mvPos = uView * vec4(pos, 1.0);
  float s = aPetalData.x * (0.8 + sin(t*aPetalData.z)*0.2);
  
  vec2 offset = (aUV - 0.5) * s;
  mvPos.xy += offset;
  
  vUV = aUV;
  gl_Position = uProj * mvPos;
}`;

const petalFS = `
precision highp float;
varying vec2 vUV;
varying float vAlpha;
varying float vType;
uniform float uTime;

void main() {
  vec2 uv = vUV - 0.5;
  
  // Petal shape
  float r = length(uv);
  float angle = atan(uv.y, uv.x);
  
  // Heart/petal shape
  float petal = 1.0 - smoothstep(0.3, 0.5, r + sin(angle*2.0+uTime*0.5)*0.08);
  if(petal < 0.01) discard;
  
  // Sakura pink gradient
  vec3 col1 = vec3(0.98, 0.82, 0.88);
  vec3 col2 = vec3(0.92, 0.60, 0.72);
  vec3 col3 = vec3(0.85, 0.40, 0.55);
  
  float t = length(uv)*2.0;
  vec3 col = mix(col1, col2, t);
  col = mix(col, col3, t*t*0.5);
  
  // Vein
  float vein = abs(uv.x) < 0.015 ? 0.15 : 0.0;
  col -= vein;
  
  float alpha = petal * vAlpha;
  if(alpha < 0.02) discard;
  
  gl_FragColor = vec4(col, alpha);
}`;

// ── Sky/Fog shader ──
const skyVS = `
attribute vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.999, 1.0); }`;

const skyFS = `
precision highp float;
uniform vec2 uRes;
uniform vec3 uSunDir;
uniform float uTime;
uniform vec3 uSkyTop;
uniform vec3 uSkyBottom;

float noise(vec2 p){
  return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);
}
float fbm(vec2 p){
  float v=0.0, a=0.5;
  for(int i=0;i<4;i++){v+=a*noise(p);p*=2.1;a*=0.5;}
  return v;
}

void main() {
  vec2 uv = gl_FragCoord.xy / uRes;
  vec3 dir;
  // map screen to sky hemisphere
  float horizon = 0.38;
  float t = (uv.y - horizon) / (1.0 - horizon);
  t = clamp(t, 0.0, 1.0);
  
  // Sky gradient
  vec3 sky = mix(uSkyBottom, uSkyTop, pow(t, 0.7));
  
  // Sun glow
  vec2 sunScreen = vec2(0.5 + uSunDir.x*0.3, horizon + uSunDir.y*0.4);
  float sunDist = length(uv - sunScreen);
  float sun = exp(-sunDist*sunDist*60.0);
  float halo = exp(-sunDist*sunDist*6.0) * 0.4;
  vec3 sunColor = vec3(1.0, 0.92, 0.72);
  sky += sunColor * sun * 1.5;
  sky += vec3(1.0,0.8,0.6)*halo;
  
  // Cloud wisps
  float cloud = fbm(uv*3.0 + vec2(uTime*0.008, 0.0));
  cloud = smoothstep(0.55, 0.75, cloud) * smoothstep(horizon+0.1, horizon+0.4, uv.y) * 0.4;
  sky = mix(sky, vec3(1.0,0.96,0.94), cloud);
  
  // Below horizon — fog
  float belowT = clamp((horizon - uv.y) / horizon, 0.0, 1.0);
  vec3 fog = vec3(0.82, 0.76, 0.72);
  sky = mix(sky, fog, belowT);
  
  gl_FragColor = vec4(sky, 1.0);
}`;

// ── Water (pond) shader ──
const waterVS = `
attribute vec3 aPos;
attribute vec2 aUV;
uniform mat4 uProj, uView, uModel;
uniform float uTime;
varying vec2 vUV;
varying vec3 vWorldPos;
void main() {
  vec3 p = aPos;
  p.y += sin(p.x*2.0+uTime)*0.03 + cos(p.z*1.8+uTime*0.7)*0.03;
  vUV = aUV;
  vec4 wp = uModel*vec4(p,1.0);
  vWorldPos = wp.xyz;
  gl_Position = uProj*uView*wp;
}`;

const waterFS = `
precision highp float;
varying vec2 vUV;
varying vec3 vWorldPos;
uniform float uTime;
uniform vec3 uSkyTop;
uniform vec3 uSkyBottom;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}

void main() {
  vec2 uv = vUV;
  
  // Ripple normals
  float r1 = noise(uv*8.0 + vec2(uTime*0.4, 0.0));
  float r2 = noise(uv*12.0 + vec2(0.0, uTime*0.3));
  
  // Reflection color
  vec3 waterDeep = mix(uSkyBottom, uSkyTop, 0.3) * 0.6;
  vec3 waterShallow = vec3(0.45, 0.68, 0.62);
  
  vec3 col = mix(waterDeep, waterShallow, r1*0.3);
  
  // Specular shimmer
  float spec = pow(max(0.0, r2-0.4)*2.5, 3.0) * 0.8;
  col += vec3(1.0,0.97,0.9) * spec;
  
  // Sakura petals on water
  float petal = noise(uv*20.0 + vec2(uTime*0.05))*noise(uv*35.0);
  petal = smoothstep(0.65, 0.75, petal) * 0.6;
  col = mix(col, vec3(0.98,0.82,0.86), petal);
  
  // Edge transparency
  float edge = min(min(uv.x, 1.0-uv.x), min(uv.y, 1.0-uv.y));
  float alpha = smoothstep(0.0, 0.08, edge) * 0.85;
  
  gl_FragColor = vec4(col, alpha);
}`;

function createBuffer(data, type=gl.ARRAY_BUFFER, usage=gl.STATIC_DRAW) {
  const buf = gl.createBuffer();
  gl.bindBuffer(type, buf);
  gl.bufferData(type, data instanceof Float32Array ? data : new Float32Array(data), usage);
  return buf;
}
function createIndexBuffer(data) {
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, buf);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(data), gl.STATIC_DRAW);
  return buf;
}

// Plane (ground/water)
function buildPlane(size, segs) {
  const verts=[], uvs=[], normals=[], indices=[];
  const step = size/segs, half = size/2;
  for(let z=0;z<=segs;z++) for(let x=0;x<=segs;x++) {
    verts.push(x*step-half, 0, z*step-half);
    uvs.push(x/segs*size, z/segs*size);
    normals.push(0,1,0);
  }
  for(let z=0;z<segs;z++) for(let x=0;x<segs;x++) {
    const tl=z*(segs+1)+x;
    indices.push(tl,tl+segs+1,tl+1,tl+1,tl+segs+1,tl+segs+2);
  }
  return {
    pos: createBuffer([].concat(...verts.reduce((a,_,i)=>i%3===0?[...a,[verts[i],verts[i+1],verts[i+2]]]:[a],[])).flat().filter((_,i,arr)=>true)),
    // simpler:
    posB: createBuffer(new Float32Array(verts)),
    uvB: createBuffer(new Float32Array(uvs)),
    normalB: createBuffer(new Float32Array(normals)),
    idxB: createIndexBuffer(indices),
    count: indices.length
  };
}

function makePlane(size, segs) {
  const verts=[], uvs=[], normals=[], indices=[];
  const step=size/segs, half=size/2;
  for(let z=0;z<=segs;z++) for(let x=0;x<=segs;x++) {
    verts.push(x*step-half, 0, z*step-half);
    uvs.push(x/segs, z/segs);
    normals.push(0,1,0);
  }
  for(let z=0;z<segs;z++) for(let x=0;x<segs;x++) {
    const tl=z*(segs+1)+x;
    indices.push(tl,tl+segs+1,tl+1,tl+1,tl+segs+1,tl+segs+2);
  }
  return { verts, uvs, normals, indices, count:indices.length };
}

// Cherry tree builder (trunk + branches + blossom clusters)
function buildCherryTree(seed) {
  const rng = (()=>{let s=seed|0; return ()=>{s=s*1664525+1013904223|0; return (s>>>0)/4294967296;};})();
  
  const verts=[], normals=[], colors=[], waves=[], indices=[];
  let ioff=0;
  
  const addCylinder = (x,y,z, dx,dy,dz, r1,r2, segs, col) => {
    const len = Math.sqrt(dx*dx+dy*dy+dz*dz);
    const ax = dx/len, ay = dy/len, az = dz/len;
    let px=0,py=1,pz=0;
    if(Math.abs(ay)>0.9){px=1;py=0;pz=0;}
    const rx=ay*pz-az*py, ry=az*px-ax*pz, rz=ax*py-ay*px;
    const rl=Math.sqrt(rx*rx+ry*ry+rz*rz);
    const bx=rx/rl,by=ry/rl,bz=rz/rl;
    const cx2=ay*bz-az*by, cy2=az*bx-ax*bz, cz2=ax*by-ay*bx;
    
    const base=ioff;
    for(let i=0;i<=segs;i++) {
      const a=i/segs*Math.PI*2;
      const cs=Math.cos(a),sn=Math.sin(a);
      // bottom ring
      const nx1=cs*bx+sn*cx2, ny1=cs*by+sn*cy2, nz1=cs*bz+sn*cz2;
      verts.push(x+nx1*r1, y, z+nz1*r1);
      normals.push(nx1,ny1,nz1); colors.push(...col); waves.push(0);
      // top ring
      verts.push(x+nx1*r2+dx, y+dy, z+nz1*r2+dz);
      normals.push(nx1,ny1,nz1); colors.push(...col); waves.push(0);
    }
    for(let i=0;i<segs;i++) {
      const b=base+i*2;
      indices.push(b,b+1,b+2, b+2,b+1,b+3);
    }
    ioff+=2*(segs+1);
  };
  
  const addSphere = (x,y,z, r, col, isWave, latSegs=6, lonSegs=8) => {
    const base=ioff;
    for(let lat=0;lat<=latSegs;lat++) {
      const theta=lat/latSegs*Math.PI;
      for(let lon=0;lon<=lonSegs;lon++) {
        const phi=lon/lonSegs*Math.PI*2;
        const nx=Math.sin(theta)*Math.cos(phi);
        const ny=Math.cos(theta);
        const nz=Math.sin(theta)*Math.sin(phi);
        // add slight position randomness for organic feel
        const jitter=(rng()-0.5)*r*0.3;
        verts.push(x+nx*(r+jitter), y+ny*(r+jitter), z+nz*(r+jitter));
        normals.push(nx,ny,nz);
        colors.push(...col);
        waves.push(isWave ? 1 : 0);
      }
    }
    for(let lat=0;lat<latSegs;lat++) for(let lon=0;lon<lonSegs;lon++) {
      const b=base+lat*(lonSegs+1)+lon;
      indices.push(b,b+lonSegs+1,b+1, b+1,b+lonSegs+1,b+lonSegs+2);
    }
    ioff+=(latSegs+1)*(lonSegs+1);
  };
  
  // Trunk
  const trunkH = 2.5 + rng()*1.5;
  const trunkR = 0.18 + rng()*0.08;
  const trunkCol = [0.28,0.18,0.10];
  addCylinder(0,0,0, 0,trunkH,0, trunkR,trunkR*0.6, 7, trunkCol);
  
  // Main branches
  const numBranch = 3 + Math.floor(rng()*3);
  for(let b=0;b<numBranch;b++) {
    const angle = b/numBranch*Math.PI*2 + rng()*0.5;
    const spread = 0.6 + rng()*0.8;
    const rise = 0.3 + rng()*0.5;
    const blen = 1.5 + rng()*1.5;
    const dx = Math.cos(angle)*spread*blen;
    const dy = rise*blen;
    const dz = Math.sin(angle)*spread*blen;
    const br = trunkR*0.45;
    addCylinder(0,trunkH*0.6,0, dx,dy,dz, br,br*0.5, 5, trunkCol);
    
    // Sub-branches
    const numSub = 2+Math.floor(rng()*2);
    for(let s=0;s<numSub;s++) {
      const sa = angle + (rng()-0.5)*1.2;
      const sl = 0.8+rng()*0.8;
      const sdx = Math.cos(sa)*0.5*sl;
      const sdy = 0.4*sl;
      const sdz = Math.sin(sa)*0.5*sl;
      addCylinder(dx,trunkH*0.6+dy, dz, sdx,sdy,sdz, br*0.4,br*0.2, 4, trunkCol);
      
      // Blossom clusters
      const numCluster = 2+Math.floor(rng()*3);
      for(let c=0;c<numCluster;c++) {
        const cx = dx+sdx + (rng()-0.5)*0.5;
        const cy = trunkH*0.6+dy+sdy + rng()*0.3;
        const cz = dz+sdz + (rng()-0.5)*0.5;
        const cr = 0.5+rng()*0.5;
        // Blossom color: white-pink gradient
        const pink = 0.75+rng()*0.2;
        const blossomCol = [0.98, pink, pink*0.9];
        addSphere(cx, cy, cz, cr, blossomCol, true);
      }
    }
    
    // Top blossoms
    const numTop = 3+Math.floor(rng()*3);
    for(let t=0;t<numTop;t++) {
      const tx = dx + (rng()-0.5)*1.0;
      const ty = trunkH*0.6+dy + rng()*0.5+0.2;
      const tz = dz + (rng()-0.5)*1.0;
      const tr2 = 0.6+rng()*0.7;
      const pink = 0.70+rng()*0.25;
      const blossomCol = [0.97, pink, pink*0.88];
      addSphere(tx, ty, tz, tr2, blossomCol, true);
    }
  }
  
  // Top canopy
  const numCanopy = 4+Math.floor(rng()*4);
  for(let c=0;c<numCanopy;c++) {
    const ang = rng()*Math.PI*2;
    const rad = rng()*1.5;
    const cx = Math.cos(ang)*rad;
    const cy = trunkH + rng()*0.8;
    const cz = Math.sin(ang)*rad;
    const cr = 0.8+rng()*0.8;
    const pink = 0.65+rng()*0.3;
    addSphere(cx, cy, cz, cr, [0.97, pink, pink*0.85], true);
  }
  
  return {
    posB: createBuffer(new Float32Array(verts)),
    normalB: createBuffer(new Float32Array(normals)),
    colorB: createBuffer(new Float32Array(colors)),
    waveB: createBuffer(new Float32Array(waves)),
    idxB: createIndexBuffer(indices),
    count: indices.length
  };
}

// Tea bush (low rounded green shape)
function buildTeaBush(seed) {
  const rng = (()=>{let s=seed|0; return ()=>{s=s*1664525+1013904223|0; return (s>>>0)/4294967296;};})();
  const verts=[], normals=[], colors=[], waves=[], indices=[];
  let ioff=0;
  
  const addEllipsoid = (x,y,z, rx,ry,rz, col, latS=5, lonS=7) => {
    const base=ioff;
    for(let la=0;la<=latS;la++) {
      const theta=la/latS*Math.PI;
      for(let lo=0;lo<=lonS;lo++) {
        const phi=lo/lonS*Math.PI*2;
        const nx=Math.sin(theta)*Math.cos(phi);
        const ny=Math.cos(theta);
        const nz=Math.sin(theta)*Math.sin(phi);
        verts.push(x+nx*rx, y+ny*ry, z+nz*rz);
        normals.push(nx,ny,nz);
        colors.push(...col);
        waves.push(0.3);
      }
    }
    for(let la=0;la<latS;la++) for(let lo=0;lo<lonS;lo++) {
      const b=base+la*(lonS+1)+lo;
      indices.push(b,b+lonS+1,b+1,b+1,b+lonS+1,b+lonS+2);
    }
    ioff+=(latS+1)*(lonS+1);
  };
  
  // Row of tea bushes
  const numBush = 3+Math.floor(rng()*3);
  for(let i=0;i<numBush;i++) {
    const x = (i-(numBush-1)/2)*0.7;
    const green1 = 0.32+rng()*0.1;
    const green2 = 0.55+rng()*0.1;
    const col = [0.12+rng()*0.08, green1, 0.08+rng()*0.06];
    const col2 = [0.18+rng()*0.06, green2, 0.12+rng()*0.05];
    addEllipsoid(x, 0.3, 0, 0.32+rng()*0.05, 0.28+rng()*0.05, 0.28+rng()*0.05, col);
    // lighter top
    addEllipsoid(x, 0.42, 0, 0.25, 0.15, 0.25, col2);
  }
  
  return {
    posB: createBuffer(new Float32Array(verts)),
    normalB: createBuffer(new Float32Array(normals)),
    colorB: createBuffer(new Float32Array(colors)),
    waveB: createBuffer(new Float32Array(waves)),
    idxB: createIndexBuffer(indices),
    count: indices.length
  };
}

// Lantern (simple box with sphere top)
function buildLantern() {
  const verts=[], normals=[], colors=[], waves=[], indices=[];
  let ioff=0;
  
  const addBox = (x,y,z,w,h,d,col) => {
    const hw=w/2,hd=d/2;
    const faces=[
      [[-hw,0,-hd],[hw,0,-hd],[hw,h,-hd],[-hw,h,-hd],[0,0,-1]],
      [[hw,0,hd],[-hw,0,hd],[-hw,h,hd],[hw,h,hd],[0,0,1]],
      [[-hw,0,hd],[-hw,0,-hd],[-hw,h,-hd],[-hw,h,hd],[-1,0,0]],
      [[hw,0,-hd],[hw,0,hd],[hw,h,hd],[hw,h,-hd],[1,0,0]],
      [[-hw,h,-hd],[hw,h,-hd],[hw,h,hd],[-hw,h,hd],[0,1,0]],
      [[-hw,0,hd],[hw,0,hd],[hw,0,-hd],[-hw,0,-hd],[0,-1,0]],
    ];
    for(const [v0,v1,v2,v3,n] of faces) {
      const base=ioff;
      for(const v of [v0,v1,v2,v3]) {
        verts.push(x+v[0],y+v[1],z+v[2]);
        normals.push(...n); colors.push(...col); waves.push(0);
      }
      indices.push(base,base+1,base+2,base,base+2,base+3);
      ioff+=4;
    }
  };
  
  const stoneCol=[0.55,0.52,0.48];
  const woodCol=[0.40,0.28,0.16];
  const paperCol=[0.85,0.72,0.55];
  
  addBox(0,0,0, 0.25,0.08,0.25, stoneCol); // base
  addBox(0,0.08,0, 0.08,0.5,0.08, stoneCol); // pole
  addBox(0,0.58,0, 0.22,0.06,0.22, woodCol); // cap1
  addBox(0,0.64,0, 0.18,0.25,0.18, paperCol); // body (paper)
  addBox(0,0.89,0, 0.22,0.06,0.22, woodCol); // cap2
  // glow effect (yellow sphere inside)
  addBox(0,0.70,0, 0.06,0.12,0.06, [0.95,0.80,0.40]); // inner glow
  
  return {
    posB: createBuffer(new Float32Array(verts)),
    normalB: createBuffer(new Float32Array(normals)),
    colorB: createBuffer(new Float32Array(colors)),
    waveB: createBuffer(new Float32Array(waves)),
    idxB: createIndexBuffer(indices),
    count: indices.length
  };
}

const lanternInstances = [];
for(let i=0;i<16;i++) {
  const angle = i/16*Math.PI*2;
  const r = 12 + (i%2)*2;
  lanternInstances.push({
    x: Math.cos(angle)*r, y:0, z: Math.sin(angle)*r, rotY:angle
  });
}

// Torii gate
const toriiMesh = buildTorii();

// Petal particles
const PETAL_COUNT = 1200;
const petalPos = new Float32Array(PETAL_COUNT*3);
const petalData = new Float32Array(PETAL_COUNT*4);
for(let i=0;i<PETAL_COUNT;i++) {
  const angle = Math.random()*Math.PI*2;
  const dist = Math.random()*35;
  petalPos[i*3] = Math.cos(angle)*dist;
  petalPos[i*3+1] = Math.random()*12;
  petalPos[i*3+2] = Math.sin(angle)*dist;
  petalData[i*4] = 0.18+Math.random()*0.22; // size
  petalData[i*4+1] = Math.random()*Math.PI*2; // phase
  petalData[i*4+2] = 0.5+Math.random()*2.0; // rot speed
  petalData[i*4+3] = Math.floor(Math.random()*3); // type
}

// Build petal billboard quads
const quadVerts = new Float32Array(PETAL_COUNT*4*3);
const quadUVs = new Float32Array(PETAL_COUNT*4*2);
const quadPetalData = new Float32Array(PETAL_COUNT*4*4);
const quadIndices = new Uint16Array(PETAL_COUNT*6);
const quadUVTemplate = [0,0, 1,0, 1,1, 0,1];

for(let i=0;i<PETAL_COUNT;i++) {
  for(let v=0;v<4;v++) {
    quadVerts[(i*4+v)*3+0] = petalPos[i*3];
    quadVerts[(i*4+v)*3+1] = petalPos[i*3+1];
    quadVerts[(i*4+v)*3+2] = petalPos[i*3+2];
    quadUVs[(i*4+v)*2+0] = quadUVTemplate[v*2];
    quadUVs[(i*4+v)*2+1] = quadUVTemplate[v*2+1];
    for(let k=0;k<4;k++) quadPetalData[(i*4+v)*4+k]=petalData[i*4+k];
  }
  const base=i*4;
  quadIndices[i*6+0]=base; quadIndices[i*6+1]=base+1; quadIndices[i*6+2]=base+2;
  quadIndices[i*6+3]=base; quadIndices[i*6+4]=base+2; quadIndices[i*6+5]=base+3;
}

const petalMesh = {
  posB: createBuffer(quadVerts, gl.ARRAY_BUFFER, gl.DYNAMIC_DRAW),
  uvB: createBuffer(quadUVs),
  dataB: createBuffer(quadPetalData),
  idxB: createIndexBuffer(Array.from(quadIndices)),
  count: PETAL_COUNT*6
};

// Update petal positions around camera
function updatePetals(camX, camZ) {
  for(let i=0;i<PETAL_COUNT;i++) {
    // Check if petal is too far from camera, if so relocate
    const dx = petalPos[i*3]-camX;
    const dz = petalPos[i*3+2]-camZ;
    if(dx*dx+dz*dz > 40*40) {
      const angle = Math.random()*Math.PI*2;
      const dist = 5+Math.random()*30;
      petalPos[i*3] = camX+Math.cos(angle)*dist;
      petalPos[i*3+2] = camZ+Math.sin(angle)*dist;
    }
    for(let v=0;v<4;v++) {
      quadVerts[(i*4+v)*3+0] = petalPos[i*3];
      quadVerts[(i*4+v)*3+2] = petalPos[i*3+2];
    }
  }
  gl.bindBuffer(gl.ARRAY_BUFFER, petalMesh.posB);
  gl.bufferData(gl.ARRAY_BUFFER, quadVerts, gl.DYNAMIC_DRAW);
}

// ══════════════════════════════════════════════════
// CAMERA & INPUT
// ══════════════════════════════════════════════════
const cam = {
  x:0, y:1.7, z:0,
  yaw:0, pitch:0,
  velX:0, velY:0, velZ:0
};

const keys = {};
let isPointerLocked = false;
let petalCollected = 0;

canvas.addEventListener('click', () => canvas.requestPointerLock());
document.addEventListener('pointerlockchange', () => {
  isPointerLocked = document.pointerLockElement === canvas;
});
document.addEventListener('mousemove', e => {
  if(!isPointerLocked) return;
  cam.yaw -= e.movementX * 0.002;
  cam.pitch -= e.movementY * 0.002;
  cam.pitch = Math.max(-1.4, Math.min(1.4, cam.pitch));
  document.getElementById('compass-needle').style.transform=`rotate(${-cam.yaw*180/Math.PI}deg)`;
});
document.addEventListener('keydown', e => keys[e.code]=true);
document.addEventListener('keyup', e => keys[e.code]=false);

// Custom cursor
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX+'px';
  cursor.style.top = e.clientY+'px';
});
document.addEventListener('mousedown', () => cursor.classList.add('active'));
document.addEventListener('mouseup', () => cursor.classList.remove('active'));

// ══════════════════════════════════════════════════
// RENDER HELPERS
// ══════════════════════════════════════════════════
function useAttrib(prog, name, buf, size) {
  const loc = gl.getAttribLocation(prog, name);
  if(loc<0) return;
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, size, gl.FLOAT, false, 0, 0);
}
function setUniformMat4(prog, name, v) {
  gl.uniformMatrix4fv(gl.getUniformLocation(prog,name), false, v);
}
function setUniform3f(prog, name, x, y, z) {
  gl.uniform3f(gl.getUniformLocation(prog,name),x,y,z);
}
function setUniform1f(prog, name, v) {
  gl.uniform1f(gl.getUniformLocation(prog,name),v);
}
function setUniform2f(prog, name, x, y) {
  gl.uniform2f(gl.getUniformLocation(prog,name),x,y);
}

const projMat = mat4.create();
const viewMat = mat4.create();
const modelMat = mat4.create();
const tmpMat = mat4.create();

function buildView() {
  const cosY=Math.cos(cam.yaw), sinY=Math.sin(cam.yaw);
  const cosPitch=Math.cos(cam.pitch), sinPitch=Math.sin(cam.pitch);
  const fx = -sinY*cosPitch;
  const fy = sinPitch;
  const fz = -cosY*cosPitch;
  mat4.lookAt(viewMat,
    [cam.x, cam.y, cam.z],
    [cam.x+fx, cam.y+fy, cam.z+fz],
    [0,1,0]
  );
}

function drawMesh(prog, mesh, model, extra) {
  gl.useProgram(prog);
  setUniformMat4(prog,'uProj',projMat);
  setUniformMat4(prog,'uView',viewMat);
  setUniformMat4(prog,'uModel',model);
  if(extra) extra(prog);
  useAttrib(prog,'aPos',mesh.posB,3);
  if(mesh.normalB) useAttrib(prog,'aNormal',mesh.normalB,3);
  if(mesh.colorB) useAttrib(prog,'aColor',mesh.colorB,3);
  if(mesh.waveB) useAttrib(prog,'aWave',mesh.waveB,1);
  if(mesh.uvB) useAttrib(prog,'aUV',mesh.uvB,2);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, mesh.idxB);
  gl.drawElements(gl.TRIANGLES, mesh.count, gl.UNSIGNED_SHORT, 0);
}

// ══════════════════════════════════════════════════
// TIME OF DAY
// ══════════════════════════════════════════════════
let timeOfDay = 0.35; // 0=midnight, 0.5=noon, 1=midnight
const DAY_SPEED = 0.00008;

function getSunDir(t) {
  const angle = t*Math.PI*2-Math.PI/2;
  return [Math.cos(angle)*0.5, Math.sin(angle), Math.cos(angle)*0.2];
}
function getSunColor(t) {
  const morning = [1.0, 0.75, 0.55];
  const noon = [1.0, 0.97, 0.90];
  const evening = [1.0, 0.55, 0.30];
  const night = [0.20, 0.25, 0.45];
  if(t<0.25) return interp3(night, morning, t/0.25);
  if(t<0.5) return interp3(morning, noon, (t-0.25)/0.25);
  if(t<0.75) return interp3(noon, evening, (t-0.5)/0.25);
  return interp3(evening, night, (t-0.75)/0.25);
}
function getSkyTop(t) {
  const day=[0.35,0.60,0.90]; const night=[0.03,0.04,0.12];
  return t>0.2&&t<0.8 ? day : interp3(night,day,Math.max(0,Math.min(1,(t>0.5?1-t:t)/0.2)));
}
function getSkyBottom(t) {
  const day=[0.72,0.85,0.98]; const night=[0.08,0.06,0.14];
  return t>0.2&&t<0.8 ? day : interp3(night,day,Math.max(0,Math.min(1,(t>0.5?1-t:t)/0.2)));
}
function interp3(a,b,t){return[a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];}
function getAmbient(t) {
  const d=Math.min(1,Math.max(0, t>0.5?(1-t)*4:(t)*4));
  return [0.15+d*0.25, 0.12+d*0.22, 0.15+d*0.28];
}

// ══════════════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════════════
let lastT = 0;
let gameTime = 0;

function update(dt) {
  timeOfDay = (timeOfDay + DAY_SPEED*dt) % 1;
  
  const speed = keys['ShiftLeft']||keys['ShiftRight'] ? 8 : 4;
  const cosY=Math.cos(cam.yaw), sinY=Math.sin(cam.yaw);
  let moveX=0, moveZ=0;
  if(keys['KeyW']||keys['ArrowUp'])   { moveX += -sinY; moveZ += -cosY; }
  if(keys['KeyS']||keys['ArrowDown']) { moveX += sinY; moveZ += cosY; }
  if(keys['KeyA']||keys['ArrowLeft']) { moveX += -cosY; moveZ += sinY; }
  if(keys['KeyD']||keys['ArrowRight']){ moveX += cosY; moveZ += -sinY; }
  
  const len = Math.sqrt(moveX*moveX+moveZ*moveZ);
  if(len>0) { moveX/=len; moveZ/=len; }
  
  cam.velX = moveX*speed;
  cam.velZ = moveZ*speed;
  
  // Simple gravity & jump
  if(keys['Space'] && cam.y<=1.71) cam.velY = 6;
  cam.velY -= 18*dt;
  
  cam.x += cam.velX*dt;
  cam.y += cam.velY*dt;
  cam.z += cam.velZ*dt;
  
  if(cam.y < 1.7) { cam.y = 1.7; cam.velY = 0; }
  
  // Collect petals near camera
  for(let i=0;i<PETAL_COUNT;i++) {
    const dx=petalPos[i*3]-cam.x, dy=petalPos[i*3+1]-cam.y, dz=petalPos[i*3+2]-cam.z;
    if(dx*dx+dy*dy+dz*dz < 1.5) {
      petalCollected++;
      petalPos[i*3+1] = 20; // send far up (reset)
      document.getElementById('petal-count').textContent = `꽃잎 ${petalCollected}개 수집`;
    }
  }
  
  // Update sun track UI
  const sunPct = timeOfDay;
  document.getElementById('sun-dot').style.left = (sunPct*100)+'%';
  
  const hour = Math.floor(timeOfDay*24);
  const min = Math.floor((timeOfDay*24-hour)*60);
  document.getElementById('time-label').textContent = `${String(hour).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
}

function render(t) {
  const dt = Math.min((t-lastT)/1000, 0.05);
  lastT = t;
  gameTime += dt;
  
  update(dt);
  updatePetals(cam.x, cam.z);
  
  buildView();
  mat4.perspective(projMat, 1.1, canvas.width/canvas.height, 0.1, 300);
  
  const sunDir = getSunDir(timeOfDay);
  const sunCol = getSunColor(timeOfDay);
  const ambient = getAmbient(timeOfDay);
  const skyTop = getSkyTop(timeOfDay);
  const skyBot = getSkyBottom(timeOfDay);
  const fogDist = 90.0;
  
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);
  gl.depthFunc(gl.LEQUAL);
  
  // ── Sky backdrop ──
  gl.disable(gl.DEPTH_TEST);
  gl.useProgram(programs.sky);
  gl.bindBuffer(gl.ARRAY_BUFFER, skyMesh.posB);
  const skyPosLoc = gl.getAttribLocation(programs.sky,'aPos');
  gl.enableVertexAttribArray(skyPosLoc);
  gl.vertexAttribPointer(skyPosLoc, 2, gl.FLOAT, false, 0, 0);
  setUniform2f(programs.sky,'uRes',canvas.width,canvas.height);
  setUniform3f(programs.sky,'uSunDir',...sunDir);
  setUniform1f(programs.sky,'uTime',gameTime);
  setUniform3f(programs.sky,'uSkyTop',...skyTop);
  setUniform3f(programs.sky,'uSkyBottom',...skyBot);
  gl.drawArrays(gl.TRIANGLES, 0, 6);
  gl.enable(gl.DEPTH_TEST);
  
  const setLighting = (prog) => {
    setUniform3f(prog,'uSunDir',...sunDir);
    setUniform3f(prog,'uSunColor',...sunCol);
    setUniform3f(prog,'uAmbient',...ambient);
    setUniform1f(prog,'uTime',gameTime);
    setUniform1f(prog,'uFogDist',fogDist);
  };
  
  // ── Ground ──
  mat4.identity(modelMat);
  drawMesh(programs.ground, groundMesh, modelMat, (prog)=>{
    setLighting(prog);
    useAttrib(prog,'aUV',groundMesh.uvB,2);
    useAttrib(prog,'aNormal',groundMesh.normalB,3);
  });
  // Fix: bind index separately for ground
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, groundMesh.idxB);
  
  const drawTreeLike = (prog, mesh, model) => {
    gl.useProgram(prog);
    setUniformMat4(prog,'uProj',projMat);
    setUniformMat4(prog,'uView',viewMat);
    setUniformMat4(prog,'uModel',model);
    setLighting(prog);
    setUniform3f(prog,'uCamPos',cam.x,cam.y,cam.z);
    useAttrib(prog,'aPos',mesh.posB,3);
    useAttrib(prog,'aNormal',mesh.normalB,3);
    useAttrib(prog,'aColor',mesh.colorB,3);
    useAttrib(prog,'aWave',mesh.waveB,1);
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, mesh.idxB);
    gl.drawElements(gl.TRIANGLES, mesh.count, gl.UNSIGNED_SHORT, 0);
  };
  
  // ── Trees (frustum-ish cull by distance) ──
  for(const inst of treeInstances) {
    const dx=inst.x-cam.x, dz=inst.z-cam.z;
    if(dx*dx+dz*dz > 90*90) continue;
    mat4.identity(modelMat);
    mat4.translate(modelMat, modelMat, [inst.x, inst.y, inst.z]);
    mat4.rotateY(modelMat, modelMat, inst.rotY);
    mat4.scale(modelMat, modelMat, [inst.scale,inst.scale,inst.scale]);
    drawTreeLike(programs.tree, inst.mesh, modelMat);
  }
  
  // ── Tea bushes ──
  for(const inst of teaBushInstances) {
    const dx=inst.x-cam.x, dz=inst.z-cam.z;
    if(dx*dx+dz*dz > 60*60) continue;
    mat4.identity(modelMat);
    mat4.translate(modelMat, modelMat, [inst.x, inst.y, inst.z]);
    mat4.rotateY(modelMat, modelMat, inst.rotY);
    drawTreeLike(programs.tree, inst.mesh, modelMat);
  }
  
  // ── Torii ──
  mat4.identity(modelMat);
  mat4.translate(modelMat, modelMat, [0, 0, -18]);
  drawTreeLike(programs.tree, toriiMesh, modelMat);
  
  // ── Lanterns ──
  for(const inst of lanternInstances) {
    mat4.identity(modelMat);
    mat4.translate(modelMat, modelMat, [inst.x, inst.y, inst.z]);
    mat4.rotateY(modelMat, modelMat, inst.rotY);
    drawTreeLike(programs.tree, lanternMesh, modelMat);
  }
  
  // ── Pond (water) ──
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  gl.useProgram(programs.water);
  mat4.identity(modelMat);
  mat4.translate(modelMat, modelMat, [0, 0.02, 5]);
  setUniformMat4(programs.water,'uProj',projMat);
  setUniformMat4(programs.water,'uView',viewMat);
  setUniformMat4(programs.water,'uModel',modelMat);
  setUniform1f(programs.water,'uTime',gameTime);
  setUniform3f(programs.water,'uSkyTop',...skyTop);
  setUniform3f(programs.water,'uSkyBottom',...skyBot);
  useAttrib(programs.water,'aPos',pondMesh.posB,3);
  useAttrib(programs.water,'aUV',pondMesh.uvB,2);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, pondMesh.idxB);
  gl.drawElements(gl.TRIANGLES, pondMesh.count, gl.UNSIGNED_SHORT, 0);
  
  // ── Petal particles ──
  gl.useProgram(programs.petal);
  gl.depthMask(false);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  setUniformMat4(programs.petal,'uProj',projMat);
  setUniformMat4(programs.petal,'uView',viewMat);
  setUniform1f(programs.petal,'uTime',gameTime);
  setUniform3f(programs.petal,'uCamPos',cam.x,cam.y,cam.z);
  useAttrib(programs.petal,'aPos',petalMesh.posB,3);
  useAttrib(programs.petal,'aUV',petalMesh.uvB,2);
  useAttrib(programs.petal,'aPetalData',petalMesh.dataB,4);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, petalMesh.idxB);
  gl.drawElements(gl.TRIANGLES, petalMesh.count, gl.UNSIGNED_SHORT, 0);
  
  gl.depthMask(true);
  gl.disable(gl.BLEND);
  
  requestAnimationFrame(render);
}

// ── Launch ──────────────────────────────────────
setTimeout(()=>{
  const loading = document.getElementById('loading');
  loading.style.opacity = '0';
  setTimeout(()=>{ loading.style.display='none'; },1500);
  requestAnimationFrame(t=>{ lastT=t; render(t); });
}, 3000);
</script>
