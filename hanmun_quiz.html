<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중학교 한문 시험지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --rice: #fdf8f0;
    --gold: #b8860b;
    --gold-lt: #e8c84a;
    --red: #9b2335;
    --brush: #2c3e50;
    --soft: #f0e8d8;
    --gray: #7f8c8d;
    --green: #1e7e44;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:var(--rice); color:var(--ink); min-height:100vh; }

  /* ════ HERO ════ */
  #hero {
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:40px 20px;
    background:
      radial-gradient(ellipse at 10% 15%, rgba(184,134,11,.10) 0%, transparent 55%),
      radial-gradient(ellipse at 88% 80%, rgba(155,35,53,.08) 0%, transparent 50%),
      var(--rice);
    position:relative; overflow:hidden;
  }
  #hero::before {
    content:"明 心 寶 鑑";
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:'Noto Serif KR',serif; font-size:clamp(60px,16vw,200px);
    font-weight:900; color:rgba(184,134,11,.05); letter-spacing:.2em;
    white-space:nowrap; pointer-events:none; user-select:none;
  }
  .hero-badge {
    background:var(--red); color:#fff;
    font-family:'Noto Serif KR',serif; font-size:13px; font-weight:600;
    letter-spacing:.15em; padding:6px 18px; border-radius:2px;
    margin-bottom:22px; box-shadow:2px 2px 0 rgba(0,0,0,.2);
  }
  .hero-title {
    font-family:'Noto Serif KR',serif; font-size:clamp(34px,7vw,70px);
    font-weight:900; text-align:center; line-height:1.15; margin-bottom:10px;
  }
  .hero-title span { color:var(--gold); }
  .hero-sub { font-size:15px; color:var(--gray); font-weight:300; text-align:center; margin-bottom:44px; letter-spacing:.05em; }

  /* 유형 뱃지 설명 */
  .type-row {
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
    margin-bottom:36px; max-width:520px;
  }
  .type-tag {
    background:white; border:1px solid #e0d8c8;
    font-size:12px; padding:5px 12px; border-radius:20px; color:var(--gray);
    display:flex; align-items:center; gap:5px;
  }
  .type-tag .dot { width:7px; height:7px; border-radius:50%; }

  /* 선택 카드 */
  .selector-wrapper {
    background:white; border:1px solid rgba(184,134,11,.2); border-radius:12px;
    padding:36px 40px; width:100%; max-width:520px;
    box-shadow:0 8px 40px rgba(0,0,0,.08), 0 2px 8px rgba(184,134,11,.1);
    position:relative; z-index:1;
  }
  .selector-wrapper::before {
    content:''; position:absolute; top:-1px; left:20px; right:20px;
    height:3px; background:linear-gradient(90deg,var(--gold),var(--red));
    border-radius:0 0 2px 2px;
  }
  .select-group { margin-bottom:26px; }
  .select-label {
    font-family:'Noto Serif KR',serif; font-size:15px; font-weight:600;
    color:var(--ink); margin-bottom:12px; display:flex; align-items:center; gap:8px;
  }
  .select-label::before {
    content:''; display:inline-block; width:4px; height:16px;
    background:var(--gold); border-radius:2px;
  }
  .btn-group { display:flex; gap:10px; flex-wrap:wrap; }
  .opt-btn {
    flex:1; min-width:90px; padding:12px 16px; border:2px solid #e8e0d0;
    background:white; border-radius:8px; font-family:'Noto Serif KR',serif;
    font-size:16px; font-weight:600; color:var(--gray);
    cursor:pointer; transition:all .18s;
  }
  .opt-btn:hover { border-color:var(--gold); color:var(--gold); background:#fffbf0; transform:translateY(-1px); }
  .opt-btn.active {
    border-color:var(--gold); background:var(--gold); color:white;
    box-shadow:0 3px 12px rgba(184,134,11,.4); transform:translateY(-1px);
  }
  .start-btn {
    width:100%; padding:16px; background:linear-gradient(135deg,var(--ink),var(--brush));
    color:white; border:none; border-radius:8px; font-family:'Noto Serif KR',serif;
    font-size:18px; font-weight:700; letter-spacing:.1em;
    cursor:pointer; transition:all .2s; margin-top:8px; position:relative; overflow:hidden;
  }
  .start-btn::after { content:'→'; position:absolute; right:20px; top:50%; transform:translateY(-50%); transition:right .2s; }
  .start-btn:hover { background:linear-gradient(135deg,#000,#1a252f); box-shadow:0 6px 24px rgba(0,0,0,.3); transform:translateY(-1px); }
  .start-btn:hover::after { right:14px; }

  /* ════ QUIZ PAGE ════ */
  #quiz-page { display:none; min-height:100vh; background:var(--rice); }
  .quiz-header {
    background:var(--ink); color:white; position:sticky; top:0; z-index:100;
    box-shadow:0 2px 20px rgba(0,0,0,.3);
  }
  .quiz-header-inner {
    max-width:960px; margin:0 auto; padding:14px 24px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
  }
  .quiz-title-bar { font-family:'Noto Serif KR',serif; font-size:18px; font-weight:700; letter-spacing:.05em; }
  .quiz-title-bar span { color:var(--gold-lt); }
  .quiz-meta { display:flex; align-items:center; gap:12px; font-size:13px; flex-wrap:wrap; }
  .meta-badge { background:rgba(255,255,255,.12); padding:4px 12px; border-radius:20px; font-weight:500; }
  .timer-badge {
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15);
    padding:4px 14px; border-radius:20px; font-size:14px; font-family:monospace;
    color:#ffd; letter-spacing:.1em;
  }
  .btn-back {
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
    color:white; padding:7px 16px; border-radius:6px; font-size:13px; cursor:pointer;
    transition:background .15s;
  }
  .btn-back:hover { background:rgba(255,255,255,.2); }
  .progress-bar-wrap { background:rgba(255,255,255,.1); height:4px; width:100%; }
  .progress-bar-fill { height:100%; background:var(--gold-lt); transition:width .3s; }

  /* 시험지 */
  .exam-sheet { max-width:960px; margin:0 auto; padding:32px 24px 80px; }
  .exam-top {
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:2px solid var(--ink); padding-bottom:16px; margin-bottom:32px;
    flex-wrap:wrap; gap:12px;
  }
  .exam-school { font-family:'Noto Serif KR',serif; font-size:22px; font-weight:700; }
  .exam-info-box { display:flex; gap:24px; font-size:13px; color:var(--gray); }
  .exam-info-box strong { color:var(--ink); }

  /* 섹션 헤더 */
  .section-header {
    display:flex; align-items:center; gap:12px;
    padding:10px 16px; margin:32px 0 14px;
    border-left:4px solid var(--gold); background:rgba(184,134,11,.06);
    border-radius:0 6px 6px 0;
  }
  .sec-icon { font-size:20px; }
  .sec-title { font-family:'Noto Serif KR',serif; font-size:15px; font-weight:700; }
  .sec-desc { font-size:12px; color:var(--gray); margin-left:auto; }

  /* 문제 그리드 */
  .questions-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
  @media(max-width:640px) {
    .questions-grid { grid-template-columns:1fr; }
    .selector-wrapper { padding:28px 20px; }
  }

  /* 문제 카드 */
  .q-card {
    background:white; border:1px solid #e8e0d0; border-radius:10px;
    padding:16px 18px; display:flex; align-items:flex-start; gap:14px;
    transition:box-shadow .15s; position:relative;
  }
  .q-card:hover { box-shadow:0 3px 16px rgba(0,0,0,.08); }
  .q-card.graded-correct { border:2px solid var(--green); }
  .q-card.graded-wrong   { border:2px solid var(--red); }
  .q-num {
    font-family:'Noto Serif KR',serif; font-size:11px; font-weight:700;
    color:white; background:var(--ink); width:26px; height:26px;
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; margin-top:2px;
  }
  .q-content { flex:1; }
  .q-type-chip {
    display:inline-block; font-size:10px; font-weight:700; letter-spacing:.06em;
    padding:2px 8px; border-radius:10px; margin-bottom:8px;
    color:white;
  }
  .chip-A { background:#5b6abf; }  /* 단문해석 */
  .chip-B { background:#b8400b; }  /* 사자성어 */
  .chip-C { background:#1e7e44; }  /* 명심보감/논어 */
  .chip-D { background:#7b3fa0; }  /* 허사 */

  /* 지문 */
  .q-passage {
    font-family:'Noto Serif KR',serif; font-size:18px; font-weight:700;
    color:var(--ink); line-height:1.5; margin-bottom:4px;
    letter-spacing:.05em;
  }
  .q-passage.sm { font-size:15px; }
  .q-prompt { font-size:12px; color:var(--gray); margin-bottom:10px; }
  .q-source { font-size:11px; color:#aaa; margin-bottom:8px; font-style:italic; }

  /* 보기 */
  .choices { display:flex; flex-direction:column; gap:5px; }
  .choice-item {
    display:flex; align-items:center; gap:8px; padding:7px 10px;
    border:1px solid #ece7df; border-radius:6px;
    cursor:pointer; transition:all .12s; font-size:14px;
  }
  .choice-item:hover { background:#fffbf0; border-color:var(--gold); }
  .choice-item.selected { background:var(--gold); border-color:var(--gold); color:white; }
  .choice-item.correct  { background:var(--green); border-color:var(--green); color:white; }
  .choice-item.wrong    { background:var(--red); border-color:var(--red); color:white; text-decoration:line-through; opacity:.7; }
  .choice-num { font-weight:700; font-size:12px; opacity:.7; min-width:14px; }
  .choice-hanja { font-family:'Noto Serif KR',serif; font-size:15px; font-weight:600; }

  /* 답안 마크 */
  .answer-mark { position:absolute; top:10px; right:12px; font-size:16px; display:none; }
  .q-card.graded-correct .answer-mark,
  .q-card.graded-wrong   .answer-mark { display:block; }

  /* 제출 */
  .submit-area { margin-top:40px; text-align:center; }
  .submit-btn {
    padding:16px 52px; background:linear-gradient(135deg,var(--red),#7a1b28);
    color:white; border:none; border-radius:8px; font-family:'Noto Serif KR',serif;
    font-size:17px; font-weight:700; letter-spacing:.1em;
    cursor:pointer; transition:all .2s; box-shadow:0 4px 16px rgba(155,35,53,.35);
  }
  .submit-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(155,35,53,.4); }

  /* 결과 모달 */
  .result-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.72);
    z-index:200; align-items:center; justify-content:center; padding:20px;
  }
  .result-overlay.show { display:flex; }
  .result-card {
    background:white; border-radius:16px; padding:48px 36px;
    max-width:420px; width:100%; text-align:center;
    animation:popIn .3s cubic-bezier(.175,.885,.32,1.275);
  }
  @keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
  .result-emoji { font-size:52px; margin-bottom:10px; }
  .result-score { font-family:'Noto Serif KR',serif; font-size:52px; font-weight:900; line-height:1; margin-bottom:4px; }
  .result-score span { font-size:22px; color:var(--gray); font-weight:400; }
  .result-grade { font-family:'Noto Serif KR',serif; font-size:20px; font-weight:700; margin:10px 0 4px; }
  .result-desc { font-size:13px; color:var(--gray); margin-bottom:24px; }
  .score-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:16px 0; padding:16px 0; border-top:1px solid #eee; border-bottom:1px solid #eee; }
  .stat-item { text-align:center; }
  .stat-num { font-family:'Noto Serif KR',serif; font-size:24px; font-weight:700; }
  .stat-label { font-size:11px; color:var(--gray); margin-top:2px; }
  .stat-item.co .stat-num { color:var(--green); }
  .stat-item.wr .stat-num { color:var(--red); }
  .result-btns { display:flex; gap:12px; }
  .result-btn { flex:1; padding:12px; border-radius:8px; font-family:'Noto Serif KR',serif; font-size:15px; font-weight:700; cursor:pointer; transition:all .15s; border:2px solid; }
  .result-btn.primary { background:var(--ink); color:white; border-color:var(--ink); }
  .result-btn.secondary { background:white; color:var(--ink); border-color:#ddd; }
  .result-btn:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.15); }
</style>
</head>
<body>

<!-- ═══════════════ HERO ═══════════════ -->
<section id="hero">
  <div class="hero-badge">📖 교육부 2022 개정 한문과 교육과정 기반</div>
  <h1 class="hero-title">중학교 <span>한문</span><br>시험 연습</h1>
  <p class="hero-sub">단문 해석 · 사자성어 · 명심보감 · 허사 — 4가지 유형 랜덤 출제</p>

  <div class="type-row">
    <div class="type-tag"><span class="dot" style="background:#5b6abf"></span>단문 해석</div>
    <div class="type-tag"><span class="dot" style="background:#b8400b"></span>사자성어</div>
    <div class="type-tag"><span class="dot" style="background:#1e7e44"></span>명심보감·논어</div>
    <div class="type-tag"><span class="dot" style="background:#7b3fa0"></span>허사(어조사)</div>
  </div>

  <div class="selector-wrapper">
    <div class="select-group">
      <div class="select-label">학습 레벨 선택</div>
      <div class="btn-group">
        <button class="opt-btn" onclick="selectOpt('level','1',this)">중 1</button>
        <button class="opt-btn active" onclick="selectOpt('level','2',this)">중 2</button>
        <button class="opt-btn" onclick="selectOpt('level','3',this)">중 3</button>
      </div>
    </div>
    <div class="select-group">
      <div class="select-label">문항 수 선택</div>
      <div class="btn-group">
        <button class="opt-btn" onclick="selectOpt('count','10',this)">10 문항</button>
        <button class="opt-btn active" onclick="selectOpt('count','20',this)">20 문항</button>
        <button class="opt-btn" onclick="selectOpt('count','30',this)">30 문항</button>
      </div>
    </div>
    <button class="start-btn" onclick="startQuiz()">시험 시작하기</button>
  </div>
</section>

<!-- ═══════════════ QUIZ PAGE ═══════════════ -->
<div id="quiz-page">
  <div class="quiz-header">
    <div class="quiz-header-inner">
      <div class="quiz-title-bar">중학교 <span>한문</span> 시험지</div>
      <div class="quiz-meta">
        <div class="meta-badge" id="level-badge">중2</div>
        <div class="meta-badge" id="count-badge">20문항</div>
        <div class="timer-badge" id="timer">00:00</div>
        <button class="btn-back" onclick="goBack()">← 처음으로</button>
      </div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="exam-sheet">
    <div class="exam-top">
      <div class="exam-school">漢文 試驗紙</div>
      <div class="exam-info-box">
        <div>학년: <strong id="info-grade">중2</strong></div>
        <div>문항: <strong id="info-count">20</strong>문항</div>
        <div>점수: <strong id="info-score">각 5점</strong></div>
      </div>
    </div>
    <div id="sections-container"></div>
    <div class="submit-area">
      <button class="submit-btn" onclick="submitQuiz()">✓ 채점하기</button>
    </div>
  </div>
</div>

<!-- 결과 모달 -->
<div class="result-overlay" id="result-overlay">
  <div class="result-card">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-score" id="result-score">80<span>점</span></div>
    <div class="result-grade" id="result-grade">잘했어요!</div>
    <div class="result-desc" id="result-desc">계속 연습하면 만점도 가능해요</div>
    <div class="score-stats">
      <div class="stat-item co"><div class="stat-num" id="st-co">0</div><div class="stat-label">정답</div></div>
      <div class="stat-item wr"><div class="stat-num" id="st-wr">0</div><div class="stat-label">오답</div></div>
      <div class="stat-item"><div class="stat-num" id="st-un">0</div><div class="stat-label">미응답</div></div>
    </div>
    <div class="result-btns">
      <button class="result-btn secondary" onclick="reviewAnswers()">오답 확인</button>
      <button class="result-btn primary" onclick="retryQuiz()">다시 풀기</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  한문 문제 데이터베이스
//  유형 A: 단문 해석  B: 사자성어  C: 명심보감·논어  D: 허사
// ════════════════════════════════════════════════════════════

const DB = {

// ── 중1 ──────────────────────────────────────────────────
1: [
  // A 단문해석
  {type:'A', passage:'父母在 不遠遊', source:'논어 里仁', prompt:'밑줄 친 부분의 뜻으로 알맞은 것을 고르시오.',
   q:'「不遠遊」의 뜻은?', answer:'멀리 떠나지 않는다',
   choices:['멀리 떠나지 않는다','먼 곳에서 논다','遠은 멀 원이다','부모님께 효도한다']},
  {type:'A', passage:'學而時習之', source:'논어 學而', prompt:'이 구절의 뜻으로 알맞은 것은?',
   q:'「學而時習之」의 해석은?', answer:'배우고 때때로 익힌다',
   choices:['배우고 때때로 익힌다','배울 때 스스로 묻는다','학문은 시간이 필요하다','배워서 남을 가르친다']},
  {type:'A', passage:'己所不欲 勿施於人', source:'논어 顔淵', prompt:'이 문장의 핵심 교훈은?',
   q:'「己所不欲 勿施於人」의 뜻은?', answer:'자기가 하기 싫은 것을 남에게 베풀지 마라',
   choices:['자기가 하기 싫은 것을 남에게 베풀지 마라','하고 싶은 일을 남에게도 권하라','욕심을 버리면 사람이 된다','남에게 친절하면 복이 온다']},
  {type:'A', passage:'溫故而知新', source:'논어 爲政', prompt:'이 구절의 뜻으로 알맞은 것은?',
   q:'「溫故而知新」의 해석은?', answer:'옛것을 익히고 새것을 안다',
   choices:['옛것을 익히고 새것을 안다','따뜻하게 대하면 새로 태어난다','옛날을 그리워한다','고전을 읽어야 한다']},
  {type:'A', passage:'三人行 必有我師焉', source:'논어 述而', prompt:'이 문장의 의미로 알맞은 것은?',
   q:'「三人行 必有我師焉」의 뜻은?', answer:'세 사람이 길을 가면 반드시 내 스승이 있다',
   choices:['세 사람이 길을 가면 반드시 내 스승이 있다','셋이서 가면 길을 잃지 않는다','많은 사람 중에 악인이 있다','세 사람은 항상 의견이 다르다']},
  // B 사자성어
  {type:'B', q:'刻舟求劍의 뜻으로 알맞은 것은?', answer:'융통성 없이 낡은 방법만 고집함',
   choices:['융통성 없이 낡은 방법만 고집함','칼로 배를 타고 강을 건넌다','세월이 흘러도 변하지 않는다','위기에서 지혜를 발휘함'],

// ═══════════════ 전역 상태 ═══════════════
let selectedLevel = 2, selectedCount = 20;
let currentQuestions = [], userAnswers = {}, isSubmitted = false;
let timerInterval, timerSeconds = 0;

// ═══════════════ 선택 UI ═══════════════
function selectOpt(type, val, btn) {
  btn.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (type === 'level') selectedLevel = parseInt(val);
  else selectedCount = parseInt(val);
}

// ═══════════════ 시작 ═══════════════
function startQuiz() {
  const pool = DB[selectedLevel];
  // 유형별 균등 분배
  currentQuestions = pickBalanced(pool, selectedCount);
  userAnswers = {};
  isSubmitted = false;

  document.getElementById('level-badge').textContent = `중${selectedLevel}`;
  document.getElementById('count-badge').textContent = `${selectedCount}문항`;
  document.getElementById('info-grade').textContent = `중${selectedLevel}`;
  document.getElementById('info-count').textContent = selectedCount;
  document.getElementById('info-score').textContent = `각 ${Math.floor(100/selectedCount)}점`;

  renderQuestions();
  document.getElementById('hero').style.display = 'none';
  document.getElementById('quiz-page').style.display = 'block';
  window.scrollTo(0, 0);
  startTimer();
}

// 유형 균등 분배 선택
function pickBalanced(pool, count) {
  const byType = {A:[], B:[], C:[], D:[]};
  pool.forEach(q => byType[q.type].push(q));

  const perType = Math.floor(count / 4);
  const remainder = count % 4;
  const order = ['A','B','C','D'];

  let result = [];
  order.forEach((t, i) => {
    const n = perType + (i < remainder ? 1 : 0);
    const shuffled = [...byType[t]].sort(() => Math.random() - 0.5);
    result = result.concat(shuffled.slice(0, Math.min(n, shuffled.length)));
  });

  // 섞어서 번호 부여
  result = result.sort(() => Math.random() - 0.5);
  return result.map((q, i) => ({...q, index: i+1, choices: shuffleChoices(q)}));
}

function shuffleChoices(q) {
  // 보기를 섞되 answer 위치를 기억
  return [...q.choices].sort(() => Math.random() - 0.5);
}

// ═══════════════ 렌더링 ═══════════════
const TYPE_META = {
  A: { label:'단문 해석', chip:'chip-A', icon:'📜', desc:'한문 단문을 읽고 해석하는 문제' },
  B: { label:'사자성어', chip:'chip-B', icon:'🀄', desc:'사자성어의 뜻과 유래를 묻는 문제' },
  C: { label:'명심보감·논어', chip:'chip-C', icon:'📖', desc:'고전 구절의 해석과 교훈을 묻는 문제' },
  D: { label:'허사(어조사)', chip:'chip-D', icon:'🔤', desc:'한문의 허사·어조사 용법을 묻는 문제' },
};

function renderQuestions() {
  const container = document.getElementById('sections-container');

  // 유형 묶기
  const groups = {A:[], B:[], C:[], D:[]};
  currentQuestions.forEach(q => groups[q.type].push(q));

  let html = '';
  ['A','B','C','D'].forEach(t => {
    const qs = groups[t];
    if (!qs.length) return;
    const m = TYPE_META[t];
    html += `
      <div class="section-header">
        <span class="sec-icon">${m.icon}</span>
        <span class="sec-title">[${t}형] ${m.label}</span>
        <span class="sec-desc">${m.desc}</span>
      </div>
      <div class="questions-grid">
        ${qs.map(q => renderCard(q)).join('')}
      </div>
    `;
  });
  container.innerHTML = html;
}

const NUMS = ['①','②','③','④'];
function renderCard(q) {
  const m = TYPE_META[q.type];
  const isPassage = q.passage;
  return `
    <div class="q-card" id="qcard-${q.index}">
      <div class="q-num">${q.index}</div>
      <div class="q-content">
        <span class="q-type-chip ${m.chip}">${m.label}</span>
        ${isPassage ? `<div class="q-passage${q.passage.length > 20 ? ' sm' : ''}">${q.passage}</div>` : ''}
        ${q.source ? `<div class="q-source">출전: ${q.source}</div>` : ''}
        <div class="q-prompt">${q.q}</div>
        <div class="choices" id="choices-${q.index}">
          ${q.choices.map((c, ci) => `
            <div class="choice-item" id="choice-${q.index}-${ci}"
              onclick="selectAnswer(${q.index}, ${ci})">
              <span class="choice-num">${NUMS[ci]}</span>
              <span>${c}</span>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="answer-mark" id="mark-${q.index}"></div>
    </div>
  `;
}

// ═══════════════ 답안 ═══════════════
function selectAnswer(qIdx, choiceIdx) {
  if (isSubmitted) return;
  userAnswers[qIdx] = choiceIdx;

  const card = document.getElementById(`qcard-${qIdx}`);
  card.querySelectorAll('.choice-item').forEach((c, i) => {
    c.classList.toggle('selected', i === choiceIdx);
  });
  updateProgress();
}

function updateProgress() {
  const pct = Object.keys(userAnswers).length / currentQuestions.length * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ═══════════════ 타이머 ═══════════════
function startTimer() {
  timerSeconds = 0;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerSeconds++;
    const m = String(Math.floor(timerSeconds/60)).padStart(2,'0');
    const s = String(timerSeconds%60).padStart(2,'0');
    document.getElementById('timer').textContent = `${m}:${s}`;
  }, 1000);
}

// ═══════════════ 채점 ═══════════════
function submitQuiz() {
  const answered = Object.keys(userAnswers).length;
  if (!isSubmitted && answered < currentQuestions.length) {
    if (!confirm(`아직 ${currentQuestions.length - answered}문항이 미응답입니다.\n채점하시겠습니까?`)) return;
  }
  isSubmitted = true;
  clearInterval(timerInterval);

  let correct = 0;
  currentQuestions.forEach(q => {
    const card = document.getElementById(`qcard-${q.index}`);
    const choices = card.querySelectorAll('.choice-item');
    const userIdx = userAnswers[q.index];
    const correctIdx = q.choices.indexOf(q.answer);

    choices.forEach((c, i) => {
      c.classList.remove('selected');
      if (i === correctIdx) c.classList.add('correct');
      else if (i === userIdx && userIdx !== correctIdx) c.classList.add('wrong');
    });

    const mark = document.getElementById(`mark-${q.index}`);
    if (userIdx === correctIdx) {
      correct++;
      card.classList.add('graded-correct');
      mark.textContent = '✓'; mark.style.color = 'var(--green)';
    } else {
      card.classList.add('graded-wrong');
      mark.textContent = '✗'; mark.style.color = 'var(--red)';
    }
  });

  const total = currentQuestions.length;
  const wrong = answered - correct;
  const unanswered = total - answered;
  const score = Math.round(correct / total * 100);

  document.getElementById('result-score').innerHTML = `${score}<span>점</span>`;
  document.getElementById('st-co').textContent = correct;
  document.getElementById('st-wr').textContent = wrong;
  document.getElementById('st-un').textContent = unanswered;

  let emoji, grade, desc;
  if (score >= 90) { emoji='🏆'; grade='최우수! 한문 실력이 탁월합니다!'; desc='거의 완벽한 실력이에요. 고전을 자유롭게 읽을 수 있어요.'; }
  else if (score >= 80) { emoji='🥇'; grade='우수! 잘했어요!'; desc='한문의 핵심을 잘 이해하고 있어요.'; }
  else if (score >= 70) { emoji='🎯'; grade='양호! 조금만 더!'; desc='오답 위주로 복습하면 금방 올라갈 수 있어요.'; }
  else if (score >= 60) { emoji='📚'; grade='보통, 더 노력해요!'; desc='명심보감과 논어 구절을 반복해서 읽어 보세요.'; }
  else { emoji='💪'; grade='분발이 필요해요!'; desc='기초 단문 해석부터 차근차근 시작해 봐요.'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-grade').textContent = grade;
  document.getElementById('result-desc').textContent = desc;
  document.getElementById('result-overlay').classList.add('show');
}

function reviewAnswers() {
  document.getElementById('result-overlay').classList.remove('show');
  window.scrollTo({top:0, behavior:'smooth'});
}

function retryQuiz() {
  document.getElementById('result-overlay').classList.remove('show');
  startQuiz();
}

function goBack() {
  clearInterval(timerInterval);
  document.getElementById('quiz-page').style.display = 'none';
  document.getElementById('hero').style.display = 'flex';
  window.scrollTo(0,0);
}
</script>
